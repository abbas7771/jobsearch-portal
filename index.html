  dd.classList.toggle('active');
  if (dd.classList.contains('active')) {
    dd.innerHTML = Object.keys(trans).map(lang => `<div class="lang-option ${lang === currentLang ? 'active' : ''}" onclick="changeLang('${lang}')">${lang.toUpperCase()}</div>`).join('');
  }
}

function changeLang(lang) {
  currentLang = lang;
  localStorage.setItem('jobLang', lang);
  document.getElementById('langDropdown').classList.remove('active');
  updateUI();
}

function displayJobs(jobsToShow) {
  const container = document.getElementById('jobsContainer');
  container.innerHTML = jobsToShow.map(job => `<div class="job-card" onclick="openJobModal(${job.id})"><div class="job-title">${job.title}</div><div class="company-name">${job.company}</div><div class="job-meta">📍 ${job.location}</div><div class="job-desc">${job.description}</div></div>`).join('');
  document.getElementById('resultCount').textContent = t('results').replace('{count}', jobsToShow.length);
}

function openJobModal(jobId) {
  const job = jobs.find(j => j.id === jobId);
  if (!job) return;
  document.getElementById('jobDetails').innerHTML = `<div class="modal-title">${job.title}</div><div class="modal-company">${job.company}</div><div class="modal-meta"><div class="modal-meta-item">📍 ${job.location}</div><div class="modal-meta-item">💼 ${t('fullTime')}</div></div><div class="modal-description">${job.fullDesc}</div><button class="modal-btn" onclick="applyJob(${job.id})">${t('applyBtn')}</button>`;
  document.getElementById('jobModal').classList.add('active');
}

function closeJobModal() { document.getElementById('jobModal').classList.remove('active'); }

function applyJob(jobId) {
  window.jobId = jobId;
  document.getElementById('emailModal').classList.add('active');
  closeJobModal();
}

function closeEmailModal() { document.getElementById('emailModal').classList.remove('active'); }

function submitEmail() {
  const email = document.getElementById('emailInput').value;
  if (!email.includes('@')) { alert('Invalid email'); return; }
  
  // Save email (here you would call your API)
  console.log('Email saved:', email);
  
  // Redirect
  setTimeout(() => {
    window.location.href = 'https://jobsearch.ink';
    document.getElementById('emailInput').value = '';
  }, 500);
}

function searchJobs() {
  const search = document.getElementById('jobSearch').value.toLowerCase();
  const loc = document.getElementById('locationSearch').value.toLowerCase();
  const filtered = jobs.filter(j => (j.title.toLowerCase().includes(search) || j.company.toLowerCase().includes(search)) && (loc === '' || j.location.toLowerCase().includes(loc)));
  displayJobs(filtered);
}

document.getElementById('jobSearch').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchJobs(); });
document.getElementById('locationSearch').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchJobs(); });

updateUI();

// Initialize AdSense
if (window.adsbygoogle) {
  try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {}
}
</script>
